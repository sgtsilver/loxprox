# Nginx Reverse Proxy Configuration for Loxone Miniserver Gen 1
# Place at: /etc/nginx/sites-available/loxone (symlink to sites-enabled)
#
# This config listens on port 1080 and proxies to the Loxone backend.
# It includes rate limiting, connection limits, and timeouts to mitigate
# application-layer DDoS and slowloris attacks.

# ─── Rate Limit Zones ────────────────────────────────────────────────────────
# 10 requests per second per IP, with a burst of 20
limit_req_zone $binary_remote_addr zone=loxone_req:10m rate=10r/s;

# Max 20 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=loxone_conn:10m;

# ─── Upstream Backend ────────────────────────────────────────────────────────
upstream loxone_backend {
    server <LOXONE_IP>:80;     # Loxone Miniserver LAN IP (router translated 1080→80)
    keepalive 32;
}

# ─── Server Block ────────────────────────────────────────────────────────────
server {
    listen 1080;
    server_name _;

    # Logging
    access_log /var/log/nginx/loxone-access.log;
    error_log  /var/log/nginx/loxone-error.log;

    # ─── Timeouts (slowloris / slow-read mitigation) ────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    15s;
    proxy_read_timeout    15s;
    send_timeout          15s;
    client_body_timeout   10s;
    client_header_timeout 10s;

    # ─── Buffer Limits ──────────────────────────────────────────────────────
    client_body_buffer_size     16k;
    client_header_buffer_size    4k;
    large_client_header_buffers 4 8k;
    client_max_body_size        10m;

    # ─── Rate Limiting ──────────────────────────────────────────────────────
    limit_req zone=loxone_req burst=20 nodelay;
    limit_conn loxone_conn 20;

    # ─── Proxy Headers ──────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ─── Location ───────────────────────────────────────────────────────────
    location / {
        proxy_pass http://loxone_backend;
    }
}
