name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
        env:
          SHELLCHECK_OPTS: -x

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check all shell scripts
        run: |
          set -e
          for f in deploy.sh detect-loxone.sh test-gateway.sh set-static-ip.sh security-monitoring/*.sh; do
            if [[ -f "$f" ]]; then
              echo "Checking: $f"
              bash -n "$f"
            fi
          done
          echo "All scripts pass syntax check."

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --exclude-path phase2-gateway/ README.md SECURITY.md CONFIGURATION-GUIDE.md CONTRIBUTING.md CHANGELOG.md
          fail: false
